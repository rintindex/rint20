<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiftP20 — Riftbound PSA 10 Blue-Chip Index</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.1/dist/apexcharts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .apexcharts-tooltip { box-shadow: 0 4px 16px rgba(15, 23, 42, 0.10) !important; border-radius: 8px !important; border: 1px solid #e2e8f0 !important; background: #ffffff !important; }
    .apexcharts-tooltip-title { background: #f8fafc !important; border-bottom: 1px solid #e2e8f0 !important; font-weight: 600 !important; }
    .apexcharts-xaxistooltip { display: none !important; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .5s ease-out both; }
    .fade-up-2 { animation: fadeUp .5s ease-out .1s both; }
    .fade-up-3 { animation: fadeUp .5s ease-out .2s both; }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  </style>
</head>
<body class="bg-slate-50 text-slate-950 antialiased">
  <div class="h-[3px] w-full" style="background: linear-gradient(90deg, #2962FF 0%, #1E88E5 100%);"></div>

  <div class="max-w-5xl mx-auto px-6 py-8">
    <header class="flex items-center justify-between pb-6 border-b border-slate-200 fade-up">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center">
          <span class="text-white font-bold text-lg">P20</span>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-950">RiftP20</h1>
          <p class="text-xs text-slate-500">Riftbound PSA 10 Blue-Chip Index</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Live</span>
      </div>
    </header>

    <section class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4 fade-up-2">
      <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 relative overflow-hidden group">
        <div class="absolute inset-0 h-[3px]" style="background: linear-gradient(90deg, #2962FF, #1E88E5); opacity: 0; group-hover:opacity-100; transition-opacity;"></div>
        <div class="flex items-start justify-between">
          <div>
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Index Points</span>
            <p class="text-4xl font-bold text-slate-950 tnum mt-2" id="indexPoints">—</p>
            <p class="text-sm mt-2" id="indexChange">—</p>
          </div>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Performance</span>
        <div class="flex items-end gap-4 mt-4">
          <div class="flex-1 text-center">
            <p class="text-2xl font-bold text-slate-950 tnum" id="totalReturn">—</p>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Total Return</p>
          </div>
          <div class="flex-1 text-center">
            <p class="text-2xl font-bold text-slate-950 tnum" id="latestDate">—</p>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">As Of</p>
          </div>
        </div>
      </div>
    </section>

    <section class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 mt-6 fade-up-3">
      <div class="flex items-center justify-between mb-5">
        <div>
          <h2 class="text-base font-bold text-slate-950">Index Performance</h2>
          <p class="text-xs text-slate-500 mt-0.5">Daily closing index points · New York timezone</p>
        </div>
        <span class="text-[11px] font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md" id="chartRange">—</span>
      </div>
      <div id="chart"></div>
    </section>

    <footer class="mt-8 pt-6 border-t border-slate-200 text-xs text-slate-400 flex items-center justify-between flex-wrap gap-2">
      <span>RiftP20 · Index performance data</span>
      <span>Timezone: NY · stats at UTC+8 12:00</span>
    </footer>
  </div>

  <script>
  const EMBEDDED_INDEX_HISTORY = [
    { "date": "2026-07-07", "index_points": 1000.00 },
    { "date": "2026-07-08", "index_points": 1098.05 }
  ];

  async function loadIndexHistory() {
    try {
      const res = await fetch('marketcap-history.json', { cache: 'no-store' });
      if (res.ok) {
        const data = await res.json();
        return data.snapshots.map(s => ({ date: s.date, index_points: s.index_points }));
      }
    } catch (e) {}
    return EMBEDDED_INDEX_HISTORY;
  }

  const fmtDate = s => {
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', timeZone: 'America/New_York' });
  };

  let chartInstance = null;

  function renderDashboard(indexHistory) {
    const n = indexHistory.length;
    if (n === 0) return;

    const last = indexHistory[n - 1];
    document.getElementById('indexPoints').textContent = last.index_points.toFixed(2);
    document.getElementById('latestDate').textContent = fmtDate(last.date);

    if (n === 1) {
      document.getElementById('indexChange').innerHTML = '<span class="text-slate-400">Base day — index anchored at 1000.00</span>';
      document.getElementById('totalReturn').textContent = '0.00%';
    } else {
      const prev = indexHistory[n - 2];
      const base = indexHistory[0];
      const dPoints = last.index_points - prev.index_points;
      const dPct = (dPoints / prev.index_points) * 100;
      const totalReturn = ((last.index_points - base.index_points) / base.index_points) * 100;

      const sign = dPoints >= 0 ? '+' : '';
      const color = dPoints >= 0 ? 'text-emerald-600' : 'text-rose-600';
      document.getElementById('indexChange').innerHTML =
        `<span class="${color} font-semibold">${sign}${dPoints.toFixed(2)} (${sign}${dPct.toFixed(2)}%)</span>`;
      document.getElementById('totalReturn').textContent =
        (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
    }
  }

  function renderChart(indexHistory) {
    if (chartInstance) { try { chartInstance.destroy(); } catch (e) {} chartInstance = null; }

    const n = indexHistory.length;
    if (n === 0) {
      document.getElementById('chart').innerHTML = '<div class="flex items-center justify-center h-[350px] text-sm text-slate-400">No data available</div>';
      document.getElementById('chartRange').textContent = '—';
      return;
    }

    document.getElementById('chartRange').textContent = n + 'D';
    const categories = indexHistory.map(h => fmtDate(h.date));
    const series = indexHistory.map(h => Number(h.index_points.toFixed(2)));
    const isSingle = n === 1;

    let yMin, yMax;
    if (isSingle) {
      const pad = indexHistory[0].index_points * 0.02;
      yMin = indexHistory[0].index_points - pad;
      yMax = indexHistory[0].index_points + pad;
    } else {
      const lo = Math.min(...series);
      const hi = Math.max(...series);
      const pad = Math.max(10, (hi - lo) * 0.15);
      yMin = lo - pad;
      yMax = hi + pad;
    }

    const options = {
      chart: { type: 'area', height: 350, background: '#ffffff', fontFamily: 'Inter, inherit', toolbar: { show: false }, zoom: { enabled: false } },
      series: [{ name: 'RiftP20', data: series }],
      colors: ['#2962FF'],
      fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.2, opacityTo: 0, stops: [0, 100], gradientToColors: ['#2962FF'] } },
      stroke: { curve: 'smooth', width: 2.5, colors: ['#2962FF'] },
      grid: { borderColor: '#F0F3FA', row: { colors: ['#ffffff'], opacity: 1 }, column: { colors: ['#ffffff'], opacity: 1 }, xaxis: { lines: { show: true } }, yaxis: { lines: { show: true } }, padding: { top: 0, right: 8, bottom: 0, left: 8 } },
      xaxis: { categories: categories, labels: { style: { colors: '#94a3b8', fontSize: '11px', fontFamily: 'Inter, sans-serif' }, trim: false }, axisBorder: { color: '#F0F3FA' }, axisTicks: { show: false }, crosshairs: { show: true, stroke: { color: '#94a3b8', width: 1, dashArray: 3 } }, tooltip: { enabled: false } },
      yaxis: { min: yMin, max: yMax, labels: { style: { colors: '#94a3b8', fontSize: '11px', fontFamily: 'Inter, sans-serif' } }, axisBorder: { show: false }, axisTicks: { show: false } },
      tooltip: { enabled: true, theme: 'light', shared: true, intersect: false, style: { fontSize: '12px', fontFamily: 'Inter, sans-serif' }, y: { formatter: v => v.toFixed(2) } },
      dataLabels: { enabled: false },
      markers: { size: isSingle ? 7 : 0, colors: ['#2962FF'], strokeColors: ['#ffffff'], strokeWidth: 2 },
      legend: { show: false }
    };

    chartInstance = new ApexCharts(document.querySelector('#chart'), options);
    chartInstance.render();
  }

  async function init() {
    const indexHistory = await loadIndexHistory();
    renderDashboard(indexHistory);
    renderChart(indexHistory);
  }

  init();
  </script>
</body>
</html>
